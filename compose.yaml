services:
  db:
    image: postgres:17
    restart: unless-stopped
    # Only the DB credentials are passed in — never app secrets like
    # DATABASE_URL or BETTER_AUTH_SECRET. Values are read from .env for
    # ${...} interpolation but not injected wholesale into the container.
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
