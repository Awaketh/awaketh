name: Visual Snapshots

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: visual-snapshots-${{ github.ref }}
  cancel-in-progress: true

env:
  # Directory the Playwright capture writes to and sentry-cli uploads from.
  SNAPSHOT_OUTPUT_DIR: snapshots
  # CI-only database and auth config. prisma.config.ts builds the connection
  # string from POSTGRES_* at load time, and the app queries the database when
  # pages behind the session proxy are captured.
  POSTGRES_USER: ci
  POSTGRES_PASSWORD: ci
  POSTGRES_DB: awaketh
  BETTER_AUTH_URL: http://localhost:3000
  BETTER_AUTH_SECRET: ci-only-secret-for-visual-snapshots

jobs:
  visual:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: awaketh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d awaketh"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # --ignore-scripts skips the postinstall hook, so generate the Prisma
      # client explicitly; the build resolves src/generated/prisma from it.
      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply database migrations
        run: bunx prisma migrate deploy

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Build app
        run: bun run build

      - name: Capture screenshots
        run: bun run snapshots

      # Sentry diffs a PR against its merge base. On push to main no base is set,
      # which establishes/advances the baseline.
      - name: Compute base SHA (pull requests only)
        if: ${{ github.event_name == 'pull_request' }}
        id: base
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_SHA=$(gh api \
            "repos/${{ github.repository }}/compare/${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            --jq '.merge_base_commit.sha')
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Upload snapshots to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: stegnet
        run: |
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION=3.5.0 sh
          BASE_SHA="${{ steps.base.outputs.base_sha }}"
          sentry-cli --log-level=info snapshots upload "$SNAPSHOT_OUTPUT_DIR" \
            --app-id awaketh-web \
            --project awaketh-web \
            ${BASE_SHA:+--base-sha "$BASE_SHA"}
